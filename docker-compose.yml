services:
  backend:
    build: ./backend
    ports:
      - '4000:4000'
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - CORS_ORIGIN=http://localhost:3000
      - BATCH_SIZE=${BATCH_SIZE:-15}
      - MAX_RETRIES=${MAX_RETRIES:-3}

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - '3000:3000'
    depends_on:
      - backend
